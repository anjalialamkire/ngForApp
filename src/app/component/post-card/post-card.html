<div class="card h-100">
    <div class="card-header">
        <h2 class="m-0">
            {{postObj.title}}
        </h2>
    </div>
    <div class="card-body">
        <p class="m-0">
            {{postObj.description}}
        </p>
    </div>
    <div class="card-footer d-flex justify-content-between">
        <button class="btn btn-sm btn-outline-primary">Edit</button>

    </div>
</div>
